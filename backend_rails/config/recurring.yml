production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  warm_simulation_cache:
    class: WarmSimulationCacheJob
    queue: cache_warming
    schedule: every 30 minutes

  warm_leaderboard_cache:
    class: WarmLeaderboardCacheJob
    queue: cache_warming
    schedule: every 6 hours at minute 5

  warm_ottoneu_cache:
    class: WarmOttoneuCacheJob
    queue: cache_warming
    schedule: every 50 minutes
